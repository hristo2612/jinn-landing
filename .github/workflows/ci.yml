name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: site

      - name: Check out Jinn truth source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: hristo2612/jinn
          fetch-depth: 0
          path: jinn-source

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.6.4

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.13.0
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: site
        run: pnpm install --frozen-lockfile

      - name: Install Jinn truth-source dependencies
        working-directory: jinn-source
        run: pnpm --filter jinn-cli install --frozen-lockfile

      - name: Run public release checks
        working-directory: site
        env:
          JINN_SOURCE_ROOT: ${{ github.workspace }}/jinn-source
          JINN_SOURCE_REPO: ${{ github.workspace }}/jinn-source
        run: pnpm check:public
